services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: always
    ports:
      - "80:80"        # HTTP
      - "81:81"        # Web UI
      - "443:443"      # HTTPS
    volumes:
      - /opt/volumes/npm/data:/data
      - /opt/volumes/npm/letsencrypt:/etc/letsencrypt


